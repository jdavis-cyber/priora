name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read   # gitleaks-action reads PR commits on pull_request events

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://priora:priora_dev_only@localhost:5432/priora
      APP_DATABASE_URL: postgresql://priora_app:priora_app_dev_only@localhost:5432/priora
      AUTH_SECRET: ci-only-not-a-real-secret
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: priora
          POSTGRES_PASSWORD: priora_dev_only
          POSTGRES_DB: priora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U priora"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # Matches the dev machine's Node major — the package-lock is written
          # by npm 11; older npm versions reject its resolution as out-of-sync.
          node-version: 25
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Migrate
        run: npm run db:migrate
      - name: Seed (test profile)
        run: npm run seed -- --profile test
      - name: Integration tests
        run: npm run test:integration
      - name: Schema drift check
        run: npm run db:check
      - name: Build
        run: npm run build
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
