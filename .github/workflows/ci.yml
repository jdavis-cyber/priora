name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read   # gitleaks-action reads PR commits on pull_request events

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # Matches the dev machine's Node major — the package-lock is written
          # by npm 11; older npm versions reject its resolution as out-of-sync.
          node-version: 25
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Schema drift check
        run: npm run db:check
      - name: Build
        run: npm run build
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
