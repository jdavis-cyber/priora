services:
  db:
    image: postgres:17-alpine
    container_name: priora_db
    environment:
      POSTGRES_USER: priora
      POSTGRES_PASSWORD: priora_dev_only   # dev/demo only — live profile uses env injection
      POSTGRES_DB: priora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priora"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
